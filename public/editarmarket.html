<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CYPX | Admin Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .admin-glow { border-bottom: 2px solid #ef4444; box-shadow: 0 0 20px rgba(239, 68, 68, 0.1); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#050505] text-gray-300 font-sans min-h-screen">
    <nav class="admin-glow bg-black/80 backdrop-blur-md p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="h-8 w-8 bg-red-600 rounded flex items-center justify-center shadow-[0_0_10px_rgba(239,68,68,0.5)]">
                <i class="fas fa-hammer text-white"></i>
            </div>
            <div>
                <h1 class="text-white font-black tracking-tighter leading-none">CYPX ADMIN</h1>
                <span class="text-[10px] text-red-500 font-mono uppercase tracking-[0.2em]">Management Mode</span>
            </div>
        </div>
        <a href="index.html" class="text-[10px] border border-gray-700 px-4 py-2 rounded hover:bg-gray-800 transition uppercase font-bold tracking-widest">
            <i class="fas fa-eye mr-2"></i> Salir a Monitor
        </a>
    </nav>

    <main class="p-6 max-w-[1600px] mx-auto">
        <div class="bg-gray-900/20 border border-gray-800 rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/40">
                <h2 class="text-xs font-black uppercase tracking-widest text-gray-500">Vinculación de Materiales Detectados</h2>
                <div id="market-status" class="text-[10px] font-mono text-red-400">READY</div>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="text-[10px] uppercase tracking-widest text-gray-600 border-b border-gray-800">
                            <th class="p-4">Game ID</th>
                            <th class="p-4">Identificación / Nombre</th>
                            <th class="p-4">Último Precio</th>
                            <th class="p-4">Stock</th>
                            <th class="p-4 text-right">Detección</th>
                        </tr>
                    </thead>
                    <tbody id="market-live-tbody">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module">
        import { initMarketLiveTab } from '../tabs/liveMarketTab.js';
        // Inicializamos explícitamente en modo admin
        document.addEventListener('DOMContentLoaded', () => {
            initMarketLiveTab({ mode: 'admin' });
        });
    </script>
</body>
</html>
